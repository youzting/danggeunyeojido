<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>당근 전국 검색</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Karrot National Search</p>
      <h1>당근 전국 검색</h1>
    </div>
    <span class="source-badge">REST API</span>
  </header>

  <main class="app-layout">
    <section class="search-panel" aria-label="검색 조건">
      <form id="searchForm">
        <label>
          <span>검색어</span>
          <input id="keyword" name="keyword" type="search" value="맥북" autocomplete="off" required>
        </label>

        <button type="submit">검색</button>
      </form>

      <div class="progress-panel" aria-label="검색 진행률">
        <div>
          <span>실행률</span>
          <strong id="progressPercent">0%</strong>
        </div>
        <div class="progress-track">
          <span id="progressBar"></span>
        </div>
        <p id="progressText">검색 대기 중</p>
      </div>
    </section>

    <section class="workspace" aria-label="검색 결과">
      <div class="map-panel">
        <div class="map-shape" aria-hidden="true">
          <span style="--x: 48%; --y: 18%"></span>
          <span style="--x: 36%; --y: 34%"></span>
          <span style="--x: 56%; --y: 47%"></span>
          <span style="--x: 68%; --y: 62%"></span>
          <span style="--x: 42%; --y: 72%"></span>
          <span style="--x: 30%; --y: 90%"></span>
        </div>
        <div class="metric-row">
          <div>
            <span>커버리지</span>
            <strong id="coverage">-</strong>
          </div>
          <div>
            <span>검색 거점</span>
            <strong id="stepCount">-</strong>
          </div>
          <div>
            <span>최적 반경</span>
            <strong id="radius">-</strong>
          </div>
        </div>
        <p id="routeSummary" class="route-summary">검색어만 입력하면 전국 커버 거점이 자동 계산됩니다.</p>
        <div class="perf-panel" aria-label="검색 성능">
          <div>
            <span>경로 계산</span>
            <strong id="planningTime">-</strong>
          </div>
          <div>
            <span>결과 수집</span>
            <strong id="listingFetchTime">-</strong>
          </div>
          <div>
            <span>전체 응답</span>
            <strong id="totalElapsedTime">-</strong>
          </div>
          <div>
            <span>공급자</span>
            <strong id="listingProvider">-</strong>
          </div>
        </div>
      </div>

      <div class="content-grid">
        <section>
          <div class="section-head">
            <h2>이동 경로</h2>
          </div>
          <ol id="steps" class="steps"></ol>
        </section>

        <section>
          <div class="section-head">
            <h2>검색 결과</h2>
            <div class="result-tools">
              <label>
                <span>정렬</span>
                <select id="sortOrder">
                  <option value="default">기본순</option>
                  <option value="priceDesc">금액 높은순</option>
                  <option value="priceAsc">금액 낮은순</option>
                </select>
              </label>
              <span id="listingCount">0건</span>
            </div>
          </div>
          <div id="listings" class="listings"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
